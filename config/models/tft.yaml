model:
  name: tft
  class: src.models.model_tft.TFTForecaster

architecture:
  hidden_size: 64
  attention_heads: 4
  dropout: 0.1
  n_static_categorical: 4    # station_id, region, biome, koppen
  n_static_real: 3           # latitude, longitude, altitude
  quantiles: [0.1, 0.5, 0.9]

training:
  batch_size: 64
  epochs: 60
  lr: 1.0e-3
  optimizer: adam
  weight_decay: 1.0e-4
  early_stopping_patience: 10
  grad_clip: 1.0
