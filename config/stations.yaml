# Estaciones INMET incluidas en el estudio.
# Identificadas por código WMO (visible en el header de cada CSV).
#
# Campos por estación:
#   code         — código WMO (4 caracteres alfanuméricos)
#   name         — nombre legible (mismo que aparece en el header INMET)
#   uf           — sigla del estado (2 letras)
#   region       — macrorregión IBGE: Norte | Nordeste | Centro-Oeste | Sudeste | Sul
#   biome        — bioma predominante: Amazonia | Cerrado | Caatinga |
#                                       Mata Atlantica | Pampa | Pantanal
#   koppen_class — clasificación Köppen-Geiger (Af, Am, Aw, As, BSh, Cfa, Cfb, Cwa, Cwb, ...)
#
# La fuente de verdad de la composición regional vive en config/regions.yaml,
# que se valida contra este archivo en tests/test_regions_consistency.py.

