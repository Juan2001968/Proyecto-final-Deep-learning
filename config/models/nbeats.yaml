model:
  name: nbeats
  class: src.models.model_nbeats.NBEATSForecaster
  variant: nbeats             # nbeats | nhits

architecture:
  stack_types: [trend, seasonality, generic]
  num_blocks_per_stack: 3
  num_layers: 4
  layer_width: 256
  expansion_coefficient_dim: 5
  trend_polynomial_degree: 3

training:
  batch_size: 64
  epochs: 50
  lr: 1.0e-3
  optimizer: adam
  weight_decay: 0.0
  early_stopping_patience: 8
  grad_clip: 1.0
